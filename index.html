<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CACOUNT 💩</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CACOUNT 💩">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="https://emojicdn.elk.sh/💩">
<link rel="apple-touch-icon" href="https://emojicdn.elk.sh/💩">

<style>
  body { 
    margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; text-align: center; 
    background: #fff; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
  }

  h1 { margin: 50px 0 10px 0; font-size: 1.2rem; letter-spacing: 4px; color: #5d4037; opacity: 0.6; }

  #mainContainer { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; margin-top: -5vh; }
  
  #poopBtn { 
    font-size: 45vw; background: none; border: none; cursor: pointer; 
    transition: transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent; 
    z-index: 2;
  }
  #poopBtn:active { transform: scale(1.1); }

  .floating-plus {
    position: fixed; font-size: 3.5rem; font-weight: bold; color: #795548;
    pointer-events: none; animation: floatUp 0.9s ease-out forwards; z-index: 2000;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-120px); opacity: 0; }
  }

  .overlay-box { 
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 380px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.3); z-index: 20; border: 1px solid #eee;
    max-height: 90vh; overflow-y: auto;
  }

  .tags-container { 
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; 
  }
  .tag-btn {
    background: #f0f0f0; border: 1px solid #ddd; padding: 10px 4px; border-radius: 10px;
    font-size: 0.75rem; cursor: pointer; transition: 0.2s; color: #555; font-weight: bold;
  }
  .tag-btn.active { background: #8d6e63; color: white; border-color: #5d4037; }

  .time-editor {
    margin-bottom: 15px; padding: 10px; border-radius: 12px; border: 1px solid #ddd;
    background: #f9f9f9; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem;
  }
  .time-editor input { border: 1px solid #ccc; border-radius: 5px; padding: 5px; font-size: 1rem; }

  textarea { width: 100%; height: 50px; border-radius: 12px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; margin: 10px 0; font-family: inherit; }
  
  button { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
  .btn-yes { background: #5d4037; color: white; width: 100%; margin-bottom: 8px; }
  .btn-no { background: #f5f5f5; color: #888; width: 100%; margin-bottom: 8px; }
  .btn-save { background: #5d4037; color: white; width: 100%; margin-bottom: 8px; margin-top: 10px; }
  .btn-perfect { background: #4caf50; color: white; width: 100%; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }

  #statsBtn { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border-radius: 50%; width: 60px; height: 60px; z-index: 10; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 11px; }
  #statsBox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 25px; box-sizing: border-box; text-align: left; }
  
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: #fdfaf8; padding: 15px; border-radius: 15px; border: 1px solid #f0ece9; }
  .stat-card small { color: #9e8d88; font-size: 0.65rem; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .stat-card b { font-size: 1.1rem; color: #5d4037; }

  .history-item { border-bottom: 1px solid #eee; padding: 12px 0; position: relative; }
  .btn-delete { background: #ffebee; color: #c62828; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; float: right; }
  
  .hidden { display: none !important; }
</style>
</head>

<body>

<h1>CACOUNT</h1>

<div id="mainContainer">
  <button id="poopBtn">💩</button>
</div>

<div id="preForm" class="overlay-box hidden">
  <p style="margin: 0 0 15px 0; font-weight: bold;">¿Quieres detalles?</p>
  <button class="btn-yes" onclick="openDetailsForm()">SÍ, ANALIZAR</button>
  <button class="btn-no" onclick="closeWithDefault()">AHORA NO</button>
</div>

<div id="form" class="overlay-box hidden">
  <p style="margin: 0; font-weight: bold;">¿Cómo ha sido?</p>
  
  <div class="time-editor">
    <span>🕒 Hora:</span>
    <input type="time" id="editTime">
  </div>

  <div class="tags-container" id="tagsContainer">
    <button class="tag-btn" onclick="toggleTag(this)">💧 Líquida</button>
    <button class="tag-btn" onclick="toggleTag(this)">🪨 Dura</button>
    <button class="tag-btn" onclick="toggleTag(this)">⛵ Flotante</button>
    <button class="tag-btn" onclick="toggleTag(this)">🔥 Picante</button>
    <button class="tag-btn" onclick="toggleTag(this)">😫 Dolorosa</button>
    <button class="tag-btn" onclick="toggleTag(this)">🩸 Sangre</button>
    <button class="tag-btn" onclick="toggleTag(this)">🐐 Bolitas</button>
    <button class="tag-btn" onclick="toggleTag(this)">💨 Explosiva</button>
    <button class="tag-btn" onclick="toggleTag(this)">⚡ Express</button>
    <button class="tag-btn" onclick="toggleTag(this)">⏳ Interminable</button>
    <button class="tag-btn" onclick="toggleTag(this)">🏃 Casi no llego</button>
    <button class="tag-btn" onclick="toggleTag(this)">👻 Fantasma</button>
  </div>
  
  <button class="btn-perfect" onclick="savePerfect()">✨ ¡PERFECT! ✨</button>
  <textarea id="desc" placeholder="Otras notas..."></textarea>
  <button class="btn-save" onclick="saveDetails()">GUARDAR REGISTRO</button>
</div>

<button id="statsBtn" onclick="toggleStats()">STATS</button>

<div id="statsBox" class="hidden">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
    <h2 style="margin:0; color:#5d4037;">ESTADÍSTICAS</h2>
    <button onclick="toggleStats()" style="background:#eee; border-radius:50px; padding: 8px 15px;">Cerrar</button>
  </div>
  <div id="statsContent"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("cacas")) || [];
let selectedTags = [];

document.getElementById("poopBtn").onclick = function(e) {
  data.push({ date: new Date().toISOString(), desc: "", isPerfect: false });
  save();
  showPlusOne(e);
  setTimeout(() => {
    document.getElementById("preForm").classList.remove("hidden");
  }, 100);
};

function showPlusOne(e) {
  const plus = document.createElement("div");
  plus.innerText = "+1";
  plus.className = "floating-plus";
  const x = e.clientX || window.innerWidth / 2;
  const y = e.clientY || window.innerHeight / 2;
  plus.style.left = (x - 20) + "px";
  plus.style.top = (y - 30) + "px"; 
  document.body.appendChild(plus);
  setTimeout(() => { plus.remove(); }, 900);
}

function save() { localStorage.setItem("cacas", JSON.stringify(data)); }

function toggleTag(btn) {
  btn.classList.toggle('active');
  const tagName = btn.innerText;
  if(selectedTags.includes(tagName)) {
    selectedTags = selectedTags.filter(t => t !== tagName);
  } else {
    selectedTags.push(tagName);
  }
}

function openDetailsForm() {
  document.getElementById("preForm").classList.add("hidden");
  document.getElementById("form").classList.remove("hidden");
  selectedTags = [];
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  const ahora = new Date();
  const horas = String(ahora.getHours()).padStart(2, '0');
  const minutos = String(ahora.getMinutes()).padStart(2, '0');
  document.getElementById("editTime").value = `${horas}:${minutos}`;
}

function updateLastEntryTime() {
  const timeVal = document.getElementById("editTime").value;
  if (timeVal) {
    const last = data[data.length - 1];
    const originalDate = new Date(last.date);
    const [h, m] = timeVal.split(":");
    originalDate.setHours(h);
    originalDate.setMinutes(m);
    last.date = originalDate.toISOString();
  }
}

function saveDetails() {
  updateLastEntryTime();
  const last = data[data.length - 1];
  const manualDesc = document.getElementById("desc").value;
  last.desc = (selectedTags.join(", ") + " " + manualDesc).trim();
  save();
  finish();
}

function savePerfect() {
  updateLastEntryTime();
  const last = data[data.length - 1];
  last.desc = "✨ ¡Perfect! Papel limpio";
  last.isPerfect = true;
  save();
  finish();
}

function closeWithDefault() { finish(); }

function finish() {
  document.getElementById("preForm").classList.add("hidden");
  document.getElementById("form").classList.add("hidden");
  document.getElementById("desc").value = "";
}

function deletePoop(index) {
  if(confirm("¿Seguro?")) {
    const realIndex = data.length - 1 - index;
    data.splice(realIndex, 1);
    save();
    toggleStats(); toggleStats();
  }
}

function toggleStats() {
  const box = document.getElementById("statsBox");
  if (!box.classList.contains("hidden")) { box.classList.add("hidden"); return; }
  if (data.length === 0) { box.innerHTML = "<div style='padding:20px'><button onclick='toggleStats()'>Cerrar</button><p>No hay datos.</p></div>"; box.classList.remove("hidden"); return; }

  data.sort((a, b) => new Date(a.date) - new Date(b.date));
  save();

  const now = new Date();
  const hoyStr = now.toISOString().slice(0, 10);
  let hoy = 0, perfects = 0;
  let mapHoras = { mañana: 0, tarde: 0, noche: 0 };
  let mapDias = {};

  data.forEach(item => {
    const d = new Date(item.date);
    const dStr = item.date.slice(0, 10);
    const h = d.getHours();
    if(item.isPerfect) perfects++;
    if(dStr === hoyStr) hoy++;
    if(h >= 6 && h < 14) mapHoras.mañana++;
    else if(h >= 14 && h < 21) mapHoras.tarde++;
    else mapHoras.noche++;
    mapDias[dStr] = (mapDias[dStr] || 0) + 1;
  });

  const mediaDiaria = (data.length / Object.keys(mapDias).length).toFixed(2);
  const momentoTop = Object.keys(mapHoras).reduce((a, b) => mapHoras[a] > mapHoras[b] ? a : b);

  const html = `
    <div class="stat-grid">
      <div class="stat-card"><small>Total</small><b>${data.length} 💩</b></div>
      <div class="stat-card"><small>Hoy</small><b>${hoy}</b></div>
      <div class="stat-card"><small>Media Diaria</small><b>${mediaDiaria}</b></div>
      <div class="stat-card"><small>Perfects</small><b>${perfects} ✨</b></div>
      <div class="stat-card"><small>Momento Top</small><b style="text-transform:capitalize;">${momentoTop}</b></div>
    </div>

    <h3>HISTORIAL</h3>
    ${data.slice().reverse().map((i, idx) => {
      const d = new Date(i.date);
      return `
        <div class="history-item">
          <button class="btn-delete" onclick="deletePoop(${idx})">Borrar</button>
          <div style="text-align:left">
            <small style="color:#aaa">${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</small><br>
            <p style="font-size:0.9rem; color:#333; margin: 4px 0 0 0;">${i.desc || '💩 Registro normal'}</p>
          </div>
        </div>
      `;
    }).join('')}
  `;

  document.getElementById("statsContent").innerHTML = html;
  box.classList.remove("hidden");
}
</script>

</body>
</html>
