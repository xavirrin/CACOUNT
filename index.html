<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CACOUNT 💩</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CACOUNT 💩">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="https://emojicdn.elk.sh/💩">
<link rel="apple-touch-icon" href="https://emojicdn.elk.sh/💩">

<style>
  body { 
    margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; text-align: center; 
    background: #fff; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
  }

  h1 { margin: 50px 0 10px 0; font-size: 1.2rem; letter-spacing: 4px; color: #5d4037; opacity: 0.6; }

  #mainContainer { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; margin-top: -5vh; }
  
  #poopBtn { 
    font-size: 45vw; background: none; border: none; cursor: pointer; 
    transition: transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent; 
    z-index: 2;
  }
  #poopBtn:active { transform: scale(1.1); }

  .floating-plus {
    position: fixed; font-size: 3.5rem; font-weight: bold; color: #795548;
    pointer-events: none; animation: floatUp 0.9s ease-out forwards; z-index: 2000;
  }

  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-120px); opacity: 0; }
  }

  .overlay-box { 
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 380px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.3); z-index: 2001; border: 1px solid #eee;
    max-height: 90vh; overflow-y: auto;
  }

  /* Estilo para el nuevo desplegable */
  .section-title { font-size: 0.75rem; font-weight: bold; color: #8d6e63; text-transform: uppercase; margin: 15px 0 5px 0; text-align: left; border-bottom: 1px solid #eee; }
  
  .bristol-select {
    width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #8d6e63;
    background: #fdfaf8; color: #5d4037; font-weight: bold; margin-bottom: 10px; font-family: inherit; font-size: 0.9rem;
  }

  .tags-container { 
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; 
  }
  .tag-btn {
    background: #f0f0f0; border: 1px solid #ddd; padding: 10px 4px; border-radius: 10px;
    font-size: 0.75rem; cursor: pointer; transition: 0.2s; color: #555; font-weight: bold;
    user-select: none;
  }
  .tag-btn.active { background: #8d6e63; color: white; border-color: #5d4037; }

  .time-editor {
    margin-bottom: 15px; padding: 10px; border-radius: 12px; border: 1px solid #ddd;
    background: #f9f9f9; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem;
  }
  .time-editor input { border: 1px solid #ccc; border-radius: 5px; padding: 5px; font-size: 1rem; }

  textarea { width: 100%; height: 50px; border-radius: 12px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; margin: 10px 0; font-family: inherit; }
  
  button { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
  .btn-yes { background: #5d4037; color: white; width: 100%; margin-bottom: 8px; }
  .btn-no { background: #f5f5f5; color: #888; width: 100%; margin-bottom: 8px; }
  .btn-save { background: #5d4037; color: white; width: 100%; margin-bottom: 8px; margin-top: 10px; }
  .btn-perfect { background: #4caf50; color: white; width: 100%; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }

  #statsBtn { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border-radius: 50%; width: 60px; height: 60px; z-index: 10; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 11px; }
  #statsBox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 25px; box-sizing: border-box; text-align: left; }
  
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: #fdfaf8; padding: 15px; border-radius: 15px; border: 1px solid #f0ece9; }
  .stat-card small { color: #9e8d88; font-size: 0.65rem; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .stat-card b { font-size: 1.1rem; color: #5d4037; }

  .history-item { border-bottom: 1px solid #eee; padding: 12px 0; position: relative; }
  .btn-delete { background: #ffebee; color: #c62828; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; float: right; margin-left: 5px; }
  .btn-edit { background: #e3f2fd; color: #1976d2; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; float: right; }
  
  .hidden { display: none !important; }
</style>
</head>

<body>

<h1>CACOUNT</h1>

<div id="mainContainer">
  <button id="poopBtn">💩</button>
</div>

<div id="preForm" class="overlay-box hidden">
  <p style="margin: 0 0 15px 0; font-weight: bold;">¿Quieres hablar de esa caca?</p>
  <button class="btn-yes" onclick="openDetailsForm(false)">SÍ</button>
  <button class="btn-no" onclick="closeWithDefault()">NO</button>
</div>

<div id="form" class="overlay-box hidden">
  <p id="formTitle" style="margin: 0; font-weight: bold;">Cuéntame más</p>
  
  <div class="time-editor">
    <span>🕒 Hora:</span>
    <input type="time" id="editTime">
  </div>

  <div class="section-title">Escala de Bristol</div>
  <select id="bristolScale" class="bristol-select">
    <option value="">¿Cómo se veía?</option>
    <option value="Tipo 1">Tipo 1: Bolas duras</option>
    <option value="Tipo 2">Tipo 2: Salchicha con bultos</option>
    <option value="Tipo 3">Tipo 3: Salchicha agrietada</option>
    <option value="Tipo 4">Tipo 4: Salchicha lisa</option>
    <option value="Tipo 5">Tipo 5: Trozos blandos definidos</option>
    <option value="Tipo 6">Tipo 6: Trozos blandos deshechos</option>
    <option value="Tipo 7">Tipo 7: Acuosa</option>
  </select>

  <div class="section-title">Etiquetas</div>
  <div class="tags-container" id="tagsContainer">
    <button id="tag-liquida" class="tag-btn" onclick="toggleTag(this)">💧 Líquida</button>
    <button id="tag-dura" class="tag-btn" onclick="toggleTag(this)">🪨 Dura</button>
    <button id="tag-pastosa" class="tag-btn" onclick="toggleTag(this)">🍮 Pastosa</button>
    <button id="tag-olorosa" class="tag-btn" onclick="toggleTag(this)">👃 Olorosa</button> 
    <button id="tag-explosiva" class="tag-btn" onclick="toggleTag(this)">💨 Explosiva</button>
    <button id="tag-flotante" class="tag-btn" onclick="toggleTag(this)">⛵ Flotante</button>
    <button id="tag-picante" class="tag-btn" onclick="toggleTag(this)">🔥 Picante</button>
    <button id="tag-dolorosa" class="tag-btn" onclick="toggleTag(this)">😫 Dolorosa</button>
    <button id="tag-sangre" class="tag-btn" onclick="toggleTag(this)">🩸 Sangre</button>
    <button id="tag-bolitas" class="tag-btn" onclick="toggleTag(this)">🐐 Bolitas</button>
    <button id="tag-regla" class="tag-btn" onclick="toggleTag(this)">🤷‍♀️ Caca de regla</button>
    <button id="tag-express" class="tag-btn" onclick="toggleTag(this)">⚡ Express</button>
    <button id="tag-interminable" class="tag-btn" onclick="toggleTag(this)">⏳ Interminable</button>
    <button id="tag-casi" class="tag-btn" onclick="toggleTag(this)">🏃 Casi no llego</button>
    <button id="tag-fuera" class="tag-btn" onclick="toggleTag(this)">🚾 Fuera de casa</button>
  </div>
  
  <button class="btn-perfect" id="perfectBtn" onclick="savePerfect()">✨ ¡PERFECT! ✨</button>
  <textarea id="desc" placeholder="Otras notas..."></textarea>
  <button class="btn-save" onclick="saveDetails()">GUARDAR CACA</button>
</div>

<button id="statsBtn" onclick="toggleStats()">STATS</button>

<div id="statsBox" class="hidden">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
    <h2 style="margin:0; color:#5d4037;">ESTADÍSTICAS</h2>
    <button onclick="toggleStats()" style="background:#eee; border-radius:50px; padding: 8px 15px;">Cerrar</button>
  </div>
  <div id="statsContent"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("cacas")) || [];
let selectedTags = [];
let editingIndex = null; 

// Mapa actualizado con todas tus nuevas etiquetas
const tagIdMap = {
  "💧 Líquida": "tag-liquida", "🪨 Dura": "tag-dura", "⛵ Flotante": "tag-flotante",
  "🔥 Picante": "tag-picante", "😫 Dolorosa": "tag-dolorosa", "🩸 Sangre": "tag-sangre",
  "🐐 Bolitas": "tag-bolitas", "💨 Explosiva": "tag-explosiva", "⚡ Express": "tag-express",
  "⏳ Interminable": "tag-interminable", "🏃 Casi no llego": "tag-casi", "🚾 Fuera de casa": "tag-fuera",
  "🍮 Pastosa": "tag-pastosa", "👃 Olorosa": "tag-olorosa", "🤷‍♀️ Caca de regla": "tag-regla"
};

// --- CORE ---
document.getElementById("poopBtn").onclick = function(e) {
  editingIndex = null;
  const nuevaCaca = { date: new Date().toISOString(), desc: "", tags: [], bristol: "", isPerfect: false, edited: false };
  data.push(nuevaCaca);
  save();
  showPlusOne(e);
  setTimeout(() => { document.getElementById("preForm").classList.remove("hidden"); }, 100);
};

function showPlusOne(e) {
  const plus = document.createElement("div");
  plus.innerText = "+1";
  plus.className = "floating-plus";
  const x = e.clientX || window.innerWidth / 2;
  const y = e.clientY || window.innerHeight / 2;
  plus.style.left = (x - 20) + "px";
  plus.style.top = (y - 30) + "px"; 
  document.body.appendChild(plus);
  setTimeout(() => { plus.remove(); }, 900);
}

function save() { localStorage.setItem("cacas", JSON.stringify(data)); }

function toggleTag(btn) {
  btn.classList.toggle('active');
  const tagName = btn.innerText;
  if(selectedTags.includes(tagName)) {
    selectedTags = selectedTags.filter(t => t !== tagName);
  } else {
    selectedTags.push(tagName);
  }
}

function openDetailsForm(isEditing = false) {
  document.getElementById("preForm").classList.add("hidden");
  document.getElementById("form").classList.remove("hidden");
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  
  const targetIndex = isEditing ? editingIndex : data.length - 1;
  const target = data[targetIndex];
  const fechaRelativa = new Date(target.date);
  
  document.getElementById("editTime").value = `${String(fechaRelativa.getHours()).padStart(2, '0')}:${String(fechaRelativa.getMinutes()).padStart(2, '0')}`;
  document.getElementById("desc").value = target.desc || "";
  document.getElementById("bristolScale").value = target.bristol || "";
  
  selectedTags = isEditing ? [...(target.tags || [])] : [];
  selectedTags.forEach(tagText => {
    const id = tagIdMap[tagText];
    if(id) { const btn = document.getElementById(id); if(btn) btn.classList.add('active'); }
  });
  
  document.getElementById("perfectBtn").classList.toggle("hidden", isEditing);
  document.getElementById("formTitle").innerText = isEditing ? "Editar Registro (Único)" : "Cuéntame más";
}

function saveDetails() {
  const index = (editingIndex !== null) ? editingIndex : data.length - 1;
  const target = data[index];
  const timeVal = document.getElementById("editTime").value;
  const originalDate = new Date(target.date);
  const [h, m] = timeVal.split(":");
  originalDate.setHours(h); originalDate.setMinutes(m);
  
  target.date = originalDate.toISOString();
  target.tags = [...selectedTags];
  target.bristol = document.getElementById("bristolScale").value;
  target.desc = document.getElementById("desc").value.trim();
  
  if (editingIndex !== null) target.edited = true;
  save();
  finish();
}

function savePerfect() {
  const target = data[data.length - 1];
  target.tags = ["✨ Perfect!"];
  target.bristol = "Tipo 4"; // Bristol ideal
  target.isPerfect = true;
  save();
  finish();
}

function finish() {
  document.getElementById("preForm").classList.add("hidden");
  document.getElementById("form").classList.add("hidden");
  document.getElementById("desc").value = "";
  document.getElementById("bristolScale").value = "";
  selectedTags = []; editingIndex = null;
  if(!document.getElementById("statsBox").classList.contains("hidden")) { toggleStats(); toggleStats(); }
}

function deletePoop(idxInverted) {
  if(confirm("¿Seguro que quieres borrar este registro?")) {
    const realIndex = data.length - 1 - idxInverted;
    data.splice(realIndex, 1);
    save();
    toggleStats(); toggleStats();
  }
}

function editPoop(idxInverted) {
  const realIndex = data.length - 1 - idxInverted;
  if (data[realIndex].edited) return;
  if(confirm("Solo puedes editar esta caca una vez, asegúrate de hacerlo correctamente!")) {
    editingIndex = realIndex;
    openDetailsForm(true);
  }
}

function closeWithDefault() { finish(); }

// --- STATS LOGIC ---
function toggleStats() {
  const box = document.getElementById("statsBox");
  if (!box.classList.contains("hidden")) { box.classList.add("hidden"); return; }
  if (data.length === 0) { 
    box.innerHTML = "<div style='padding:25px'><button onclick='toggleStats()'>Cerrar</button><p>No hay datos.</p></div>"; 
    box.classList.remove("hidden"); return; 
  }

  data.sort((a, b) => new Date(a.date) - new Date(b.date));
  
  const dates = [...new Set(data.map(i => i.date.slice(0, 10)))].sort();
  let maxStreak = 0, currentStreak = 0, tempStreak = 1;
  for (let i = 0; i < dates.length; i++) {
    if (i > 0) {
      const d1 = new Date(dates[i-1]);
      const d2 = new Date(dates[i]);
      tempStreak = ((d2 - d1) / 86400000 === 1) ? tempStreak + 1 : 1;
    }
    maxStreak = Math.max(maxStreak, tempStreak);
  }

  const hoyStr = new Date().toISOString().slice(0, 10);
  let hoy = 0, perfects = 0, mapDias = {}, tagCounts = {}, timeCounts = { Mañana: 0, Tarde: 0, Noche: 0 };

  data.forEach(item => {
    const d = new Date(item.date);
    const h = d.getHours();
    if(item.isPerfect) perfects++;
    if(item.date.slice(0, 10) === hoyStr) hoy++;
    mapDias[item.date.slice(0, 10)] = true;

    if(h >= 6 && h < 14) timeCounts.Mañana++;
    else if(h >= 14 && h < 21) timeCounts.Tarde++;
    else timeCounts.Noche++;

    if(item.tags) {
      item.tags.forEach(t => {
        if(t !== "✨ Perfect!") tagCounts[t] = (tagCounts[t] || 0) + 1;
      });
    }
  });

  const momentoTop = Object.keys(timeCounts).reduce((a, b) => timeCounts[a] > timeCounts[b] ? a : b);
  const tagTop = Object.keys(tagCounts).length > 0 ? Object.keys(tagCounts).reduce((a, b) => tagCounts[a] > tagCounts[b] ? a : b) : "Ninguna";
  const mediaDiaria = (data.length / Object.keys(mapDias).length).toFixed(1);

  const html = `
    <div class="stat-grid">
      <div class="stat-card"><small>Racha Actual</small><b>${currentStreak} días 🔥</b></div>
      <div class="stat-card"><small>Mejor Racha</small><b>${maxStreak} ⭐</b></div>
      <div class="stat-card"><small>Total</small><b>${data.length} 💩</b></div>
      <div class="stat-card"><small>Hoy</small><b>${hoy}</b></div>
      <div class="stat-card"><small>Media</small><b>${mediaDiaria}/día</b></div>
      <div class="stat-card"><small>Perfects</small><b>${perfects} ✨</b></div>
      <div class="stat-card"><small>Momento Top</small><b>${momentoTop} 🕒</b></div>
      <div class="stat-card"><small>Caca + típica</small><b>${tagTop}</b></div>
    </div>
    <h3>HISTORIAL</h3>
    ${data.slice().reverse().map((i, idx) => {
      const d = new Date(i.date);
      let visualDesc = "";
      // Añadir Bristol al historial si existe
      if(i.bristol) visualDesc += `<span style="background:#8d6e63; color:white; padding:2px 6px; border-radius:5px; font-size:0.7rem; margin-right:5px;">${i.bristol}</span> `;
      if(i.tags && i.tags.length > 0) visualDesc += `<b>${i.tags.join(", ")}</b>`;
      if(i.desc) visualDesc += (visualDesc ? " - " : "") + i.desc;
      return `
        <div class="history-item">
          <button class="btn-delete" onclick="deletePoop(${idx})">Borrar</button>
          ${!i.edited ? `<button class="btn-edit" onclick="editPoop(${idx})">Editar</button>` : `<small style="float:right; color:#4caf50; font-weight:bold;">EDITADO ✓</small>`}
          <div style="text-align:left">
            <small style="color:#aaa">${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</small><br>
            <p style="font-size:0.9rem; color:#333; margin: 4px 0 0 0;">${visualDesc || '💩 Registro normal'}</p>
          </div>
        </div>
      `;
    }).join('')}
  `;
  document.getElementById("statsContent").innerHTML = html;
  box.classList.remove("hidden");
}
</script>
</body>
</html>
